spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kommunity
    # O spring quando executado pelo maven nao carrega variaveis declaradas em .env aqui por algum motivo, por isso a gambiarra 
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      data-location: classpath*:data.sql
      mode: always
    
logging:
  level:
    org.springframework.boot.sql.init: DEBUG